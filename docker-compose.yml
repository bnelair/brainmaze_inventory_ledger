version: "3.9"  # kept for compatibility with older Docker Compose v1 installations

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brainmaze-inventory-ledger:latest
    container_name: brainmaze-ledger
    restart: unless-stopped

    # ── Environment ──────────────────────────────────────────────────────────
    environment:
      # Application paths (do not change unless you know what you're doing)
      - DATA_DIR=/app/data
      - REPORTS_DIR=/app/reports

      # Git authentication  ── PAT | SSH | APP
      - GIT_AUTH_METHOD=${GIT_AUTH_METHOD:-PAT}
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - GIT_USER_NAME=${GIT_USER_NAME:-Brainmaze Bot}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-brainmaze@lab.local}

      # git-crypt (optional – only for encrypted private repositories)
      - GIT_CRYPT_KEY=${GIT_CRYPT_KEY:-}

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Persistent inventory data (JSONL events + schema.yaml)
      - ./inventory_data:/app/data

      # Temporary PDF cache (not persisted between container restarts)
      - ./reports:/app/reports

      # SSH keys for key-based Git auth (read-only, optional)
      # Comment out if using PAT/APP auth.
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro

    # ── Ports ────────────────────────────────────────────────────────────────
    ports:
      - "${APP_PORT:-8501}:8501"

    # ── Health check ─────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
