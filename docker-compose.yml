services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brainmaze-inventory-ledger:1.0.0
    container_name: brainmaze-ledger
    restart: unless-stopped

    environment:
      - DATA_DIR=/app/data
      - REPORTS_DIR=/app/reports
      - GIT_AUTH_METHOD=${GIT_AUTH_METHOD:-PAT}
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_USERNAME=${GIT_USERNAME:-}
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - GIT_USER_NAME=${GIT_USER_NAME:-Brainmaze Bot}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-brainmaze@lab.local}
      - GIT_CRYPT_KEY=${GIT_CRYPT_KEY:-}
      - GIT_ALLOW_INSECURE_SSH=${GIT_ALLOW_INSECURE_SSH:-false}
      - GIT_SSH_KNOWN_HOSTS=${GIT_SSH_KNOWN_HOSTS:-}

    volumes:
      - ./inventory_data:/app/data
      - ./reports:/app/reports

      # SSH keys for key-based Git auth (read-only, optional)
      # Comment out if using PAT/APP auth.
      # NOTE: SSH_DIR must be an absolute path (tilde expansion is unreliable in Compose).
      - ${SSH_DIR:-${HOME}/.ssh}:/root/.ssh:ro

    ports:
      - "${APP_PORT:-8501}:8501"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
